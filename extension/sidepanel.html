<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Young+Serif&family=DM+Sans:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0e6ca;
      color: #4a3728;
      padding: 20px;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(74,55,40,0.1);
    }
    .header img {
      width: 28px;
      height: 28px;
      mix-blend-mode: multiply;
    }
    .header h1 {
      font-family: 'Young Serif', serif;
      font-size: 18px;
      font-weight: 400;
      color: #4a3728;
    }
    .header-sub {
      margin-left: auto;
      font-size: 11px;
      color: rgba(74,55,40,0.5);
    }

    /* ── Verdict banner ── */
    .verdict-banner {
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      text-align: center;
    }
    .verdict-banner.ai { background: rgba(212,69,107,0.12); }
    .verdict-banner.heavy { background: rgba(249,115,22,0.12); }
    .verdict-banner.light { background: rgba(245,158,11,0.12); }
    .verdict-banner.human { background: rgba(34,197,94,0.12); }

    .verdict-label {
      font-family: 'Young Serif', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 4px;
    }
    .verdict-banner.ai .verdict-label { color: #d4456b; }
    .verdict-banner.heavy .verdict-label { color: #f97316; }
    .verdict-banner.light .verdict-label { color: #f59e0b; }
    .verdict-banner.human .verdict-label { color: #16a34a; }

    .verdict-confidence {
      font-size: 13px;
      color: rgba(74,55,40,0.6);
    }

    /* ── Confidence meter ── */
    .meter {
      margin-bottom: 16px;
    }
    .meter-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(74,55,40,0.5);
      margin-bottom: 6px;
    }
    .meter-track {
      height: 8px;
      background: #e6d9b8;
      border-radius: 4px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    /* ── Collapsible sections ── */
    .section {
      margin-bottom: 12px;
      background: rgba(74,55,40,0.03);
      border-radius: 10px;
      border: 1px solid rgba(74,55,40,0.06);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease;
    }
    .section-header:hover {
      background: rgba(74,55,40,0.04);
    }
    .section-header-title {
      font-family: 'Young Serif', serif;
      font-size: 14px;
      font-weight: 400;
      color: #4a3728;
    }
    .section-header-chevron {
      width: 16px;
      height: 16px;
      color: rgba(74,55,40,0.35);
      transition: transform 0.25s ease;
      flex-shrink: 0;
    }
    .section.open .section-header-chevron {
      transform: rotate(180deg);
    }

    .section-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease, padding 0.3s ease;
      padding: 0 14px;
    }
    .section.open .section-content {
      max-height: 2000px;
      padding: 0 14px 14px;
    }

    .section-title {
      font-family: 'Young Serif', serif;
      font-size: 16px;
      font-weight: 400;
      color: #4a3728;
      margin-bottom: 8px;
    }

    /* ── Quick stats grid ── */
    .quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: rgba(74,55,40,0.04);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      border: 1px solid rgba(74,55,40,0.06);
    }
    .stat-value {
      font-family: 'Young Serif', serif;
      font-size: 24px;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 2px;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(74,55,40,0.5);
    }

    /* ── SynthID badge ── */
    .synthid-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 12px;
      font-weight: 600;
    }
    .synthid-badge .synthid-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }
    .synthid-badge.watermarked {
      background: rgba(212,69,107,0.10);
      border: 1px solid rgba(212,69,107,0.20);
      color: #d4456b;
    }
    .synthid-badge.not_watermarked {
      background: rgba(34,197,94,0.10);
      border: 1px solid rgba(34,197,94,0.20);
      color: #16a34a;
    }
    .synthid-badge.uncertain {
      background: rgba(245,158,11,0.10);
      border: 1px solid rgba(245,158,11,0.20);
      color: #b45309;
    }
    .synthid-detail {
      font-weight: 400;
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* ── Method breakdown ── */
    .method-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 12px;
    }
    .method-name {
      min-width: 90px;
      color: rgba(74,55,40,0.7);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .method-bar {
      flex: 1;
      height: 6px;
      background: #e6d9b8;
      border-radius: 3px;
      overflow: hidden;
    }
    .method-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .method-score {
      min-width: 36px;
      text-align: right;
      font-weight: 600;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }
    .method-weight {
      min-width: 32px;
      text-align: right;
      font-size: 10px;
      color: rgba(74,55,40,0.4);
      font-variant-numeric: tabular-nums;
    }
    .method-tier {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      padding: 1px 4px;
      border-radius: 3px;
      line-height: 1.4;
    }
    .method-tier.primary { background: rgba(34,197,94,0.12); color: #16a34a; }
    .method-tier.watermark { background: rgba(212,69,107,0.12); color: #d4456b; }
    .method-tier.escalation { background: rgba(147,51,234,0.12); color: #9333ea; }
    .method-tier.fallback { background: rgba(74,55,40,0.08); color: rgba(74,55,40,0.5); }
    .method-unavailable {
      opacity: 0.4;
    }
    .method-status {
      font-size: 10px;
      color: rgba(74,55,40,0.4);
      font-style: italic;
    }

    /* ── Feature analysis ── */
    .feature-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 12px;
    }
    .feature-name {
      min-width: 100px;
      color: rgba(74,55,40,0.6);
      font-weight: 500;
    }
    .feature-bar {
      flex: 1;
      height: 5px;
      background: #e6d9b8;
      border-radius: 3px;
      overflow: hidden;
    }
    .feature-bar-fill {
      height: 100%;
      border-radius: 3px;
    }
    .feature-value {
      min-width: 36px;
      text-align: right;
      font-weight: 600;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }
    .feature-interp {
      font-size: 10px;
      color: rgba(74,55,40,0.45);
      min-width: 70px;
      text-align: right;
    }

    /* ── Pangram bar ── */
    .pangram-bar {
      display: flex;
      height: 14px;
      border-radius: 7px;
      overflow: hidden;
      margin-bottom: 6px;
      background: #e6d9b8;
    }
    .pangram-segment {
      height: 100%;
      transition: width 0.4s ease;
      position: relative;
    }
    .pangram-segment:first-child {
      border-radius: 7px 0 0 7px;
    }
    .pangram-segment:last-child {
      border-radius: 0 7px 7px 0;
    }
    .pangram-segment:only-child {
      border-radius: 7px;
    }
    .pangram-legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .pangram-legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: rgba(74,55,40,0.6);
    }
    .pangram-legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Reasons ── */
    .reason {
      font-size: 13px;
      color: rgba(74,55,40,0.75);
      padding: 6px 0;
      padding-left: 12px;
      position: relative;
      line-height: 1.5;
    }
    .reason::before {
      content: "";
      position: absolute;
      left: 0;
      top: 12px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #d4456b;
    }

    /* ── Sentence breakdown ── */
    .sentence-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      font-size: 12px;
    }
    .sentence-bar {
      width: 50px;
      height: 5px;
      background: #e6d9b8;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sentence-fill {
      height: 100%;
      border-radius: 3px;
    }
    .sentence-text {
      flex: 1;
      color: rgba(74,55,40,0.7);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .sentence-pct {
      font-weight: 600;
      font-size: 11px;
      min-width: 30px;
      text-align: right;
    }

    /* ── Caveat ── */
    .caveat {
      font-size: 12px;
      font-style: italic;
      color: rgba(74,55,40,0.5);
      padding: 10px 12px;
      background: rgba(74,55,40,0.04);
      border-radius: 8px;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    /* ── Provenance ── */
    .provenance {
      font-size: 11px;
      color: rgba(74,55,40,0.4);
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .provenance-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .provenance-label {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-size: 9px;
      color: rgba(74,55,40,0.35);
    }
    .provenance-value {
      font-family: 'DM Sans', monospace;
      font-size: 10px;
      color: rgba(74,55,40,0.5);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Model footer ── */
    .model-info {
      font-size: 11px;
      color: rgba(74,55,40,0.4);
      padding-top: 12px;
      border-top: 1px solid rgba(74,55,40,0.08);
    }

    /* ── Open Full Analysis button ── */
    .open-full-btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 10px;
      background: #d4456b;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.1s ease;
    }
    .open-full-btn:hover {
      background: #c13a5e;
    }
    .open-full-btn:active {
      transform: scale(0.98);
    }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: rgba(74,55,40,0.4);
      font-size: 14px;
    }
    .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Baloney">
    <h1>Baloney</h1>
    <span class="header-sub">Detection Detail</span>
  </div>

  <div id="content">
    <div class="empty">
      <div class="empty-icon">&#x1f437;</div>
      <div>Click a detection dot to view analysis details here.</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
