<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1a2e;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6) 1;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .logo { font-size: 20px; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      animation: status-pulse 2s ease-in-out infinite;
    }
    @keyframes status-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #1a2744;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .exposure-bar {
      background: #1a2744;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    .exposure-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .bar-track {
      height: 8px;
      background: #0f1a2e;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .bar-fill.low { background: #22c55e; }
    .bar-fill.medium { background: #eab308; }
    .bar-fill.high { background: #ef4444; }
    .exposure-percent {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-top: 6px;
    }
    .session-timer {
      text-align: center;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 12px;
    }
    .session-timer span {
      color: #94a3b8;
      font-weight: 600;
    }
    .dashboard-link {
      display: block;
      text-align: center;
      padding: 10px;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .dashboard-link:hover { background: #2563eb; }
    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 10px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🔍</span>
    <h1>TrustLens</h1>
    <div class="status-dot" title="Scanning active"></div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="scanned">0</div>
      <div class="stat-label">Images Scanned</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="flagged">0</div>
      <div class="stat-label">AI Flagged</div>
    </div>
  </div>

  <div class="exposure-bar">
    <div class="exposure-label">AI Exposure This Session</div>
    <div class="bar-track">
      <div class="bar-fill low" id="bar" style="width: 0%"></div>
    </div>
    <div class="exposure-percent" id="percent">0%</div>
  </div>

  <div class="session-timer" id="timer">Session: <span>0m 0s</span></div>

  <a href="https://trustlens-nu.vercel.app/dashboard" target="_blank" class="dashboard-link">
    Open Full Dashboard →
  </a>

  <div class="footer">TrustLens v0.1.0 · MadData26</div>

  <script>
    // Animated count-up effect
    function animateCount(el, target) {
      if (target === 0) { el.textContent = "0"; return; }
      const duration = 600;
      const start = performance.now();
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        // ease-out cubic
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Session timer
    function startTimer() {
      chrome.storage.local.get("sessionStartTime", (data) => {
        const startTime = data.sessionStartTime || Date.now();
        const timerSpan = document.querySelector("#timer span");
        function update() {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const mins = Math.floor(elapsed / 60);
          const secs = elapsed % 60;
          timerSpan.textContent = `${mins}m ${secs}s`;
        }
        update();
        setInterval(update, 1000);
      });
    }

    // Load stats and animate
    chrome.storage.local.get("sessionStats", (data) => {
      const stats = data.sessionStats || { scanned: 0, flaggedAI: 0 };
      const pct = stats.scanned > 0
        ? Math.round((stats.flaggedAI / stats.scanned) * 100)
        : 0;

      animateCount(document.getElementById("scanned"), stats.scanned);
      animateCount(document.getElementById("flagged"), stats.flaggedAI);
      document.getElementById("percent").textContent = `${pct}%`;

      const bar = document.getElementById("bar");
      bar.style.width = `${pct}%`;
      bar.className = `bar-fill ${pct > 40 ? "high" : pct > 20 ? "medium" : "low"}`;
    });

    startTimer();
  </script>
</body>
</html>
