<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1a2e;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, #3b82f6, #8b5cf6, #3b82f6) 1;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .logo { font-size: 20px; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-left: auto;
      animation: status-pulse 2s ease-in-out infinite;
    }
    @keyframes status-pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: #1a2744;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }
    .stat-number {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }
    .stat-label {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .exposure-bar {
      background: #1a2744;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .exposure-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
    }
    .bar-track {
      height: 8px;
      background: #0f1a2e;
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }
    .bar-fill.low { background: #22c55e; }
    .bar-fill.medium { background: #eab308; }
    .bar-fill.high { background: #ef4444; }
    .exposure-percent {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-top: 6px;
    }
    /* Information Diet Score card */
    .ids-card {
      background: #1a2744;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ids-grade {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
      min-width: 40px;
      text-align: center;
    }
    .ids-right {
      flex: 1;
    }
    .ids-title {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .ids-score {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .ids-score span {
      font-size: 11px;
      font-weight: 400;
      color: #64748b;
    }
    .session-timer {
      text-align: center;
      font-size: 11px;
      color: #64748b;
      margin-bottom: 12px;
    }
    .session-timer span {
      color: #94a3b8;
      font-weight: 600;
    }
    .dashboard-link {
      display: block;
      text-align: center;
      padding: 10px;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .page-section {
      background: #1a2744;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .page-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #94a3b8;
    }
    .page-icon { font-size: 14px; }
    .page-hostname {
      font-weight: 600;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 200px;
    }
    .page-stats {
      display: flex;
      gap: 12px;
    }
    .page-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .page-stat-num {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .page-stat-label {
      font-size: 10px;
      color: #64748b;
    }
    .top-pages {
      background: #1a2744;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .page-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 11px;
    }
    .page-row-name {
      flex: 1;
      color: #e2e8f0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .page-row-bar {
      width: 60px;
      height: 4px;
      background: #0f1a2e;
      border-radius: 2px;
      overflow: hidden;
    }
    .page-row-fill {
      height: 100%;
      border-radius: 2px;
    }
    .page-row-count {
      color: #64748b;
      font-size: 10px;
      min-width: 20px;
      text-align: right;
    }
    /* Filter mode selector */
    .filter-section {
      background: #1a2744;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .filter-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .filter-buttons {
      display: flex;
      gap: 4px;
    }
    .filter-btn {
      flex: 1;
      padding: 6px 0;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      background: #0f1a2e;
      color: #94a3b8;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .filter-btn:hover {
      border-color: #3b82f6;
      color: #e2e8f0;
    }
    .filter-btn.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }
    .dashboard-link:hover { background: #2563eb; }
    .footer {
      text-align: center;
      margin-top: 12px;
      font-size: 10px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🐷</span>
    <h1>Baloney</h1>
    <div class="status-dot" title="Scanning active"></div>
    <span style="font-size:9px;color:#22c55e;font-weight:600;margin-left:-4px">Real AI</span>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="scanned">0</div>
      <div class="stat-label">Scanned</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="flagged">0</div>
      <div class="stat-label">Flagged</div>
    </div>
  </div>

  <div class="exposure-bar">
    <div class="exposure-label">AI Exposure This Session</div>
    <div class="bar-track">
      <div class="bar-fill low" id="bar" style="width: 0%"></div>
    </div>
    <div class="exposure-percent" id="percent">0%</div>
  </div>

  <div class="filter-section">
    <div class="filter-label">AI Content Filter</div>
    <div class="filter-buttons">
      <button class="filter-btn active" data-mode="label">Label</button>
      <button class="filter-btn" data-mode="blur">Blur</button>
      <button class="filter-btn" data-mode="hide">Hide</button>
    </div>
  </div>

  <div class="ids-card" id="ids-card">
    <div class="ids-grade" id="ids-grade" style="color: #64748b">—</div>
    <div class="ids-right">
      <div class="ids-title">Information Diet</div>
      <div class="ids-score" id="ids-score">— <span>/ 100</span></div>
    </div>
  </div>

  <div class="page-section" id="page-section" style="display:none">
    <div class="page-header">
      <span class="page-icon">📄</span>
      <span class="page-hostname" id="page-hostname">—</span>
    </div>
    <div class="page-stats">
      <div class="page-stat">
        <span class="page-stat-num" id="page-images">0</span>
        <span class="page-stat-label">Images</span>
      </div>
      <div class="page-stat">
        <span class="page-stat-num" id="page-text">0</span>
        <span class="page-stat-label">Text</span>
      </div>
      <div class="page-stat">
        <span class="page-stat-num" id="page-flagged">0</span>
        <span class="page-stat-label">Flagged</span>
      </div>
    </div>
  </div>

  <div class="top-pages" id="top-pages" style="display:none">
    <div class="section-title">Top Pages</div>
    <div id="pages-list"></div>
  </div>

  <div class="session-timer" id="timer">Session: <span>0m 0s</span></div>

  <a href="https://trustlens-nu.vercel.app/dashboard" target="_blank" class="dashboard-link">
    Open Full Dashboard →
  </a>

  <div class="footer">Baloney v0.3.0 · MadData26</div>

  <script>
    // Grade color mapping
    const GRADE_COLORS = {
      "A+": "#22c55e", "A": "#22c55e", "A-": "#22c55e",
      "B+": "#84cc16", "B": "#84cc16", "B-": "#84cc16",
      "C+": "#eab308", "C": "#eab308", "C-": "#eab308",
      "D+": "#f97316", "D": "#f97316", "D-": "#f97316",
      "F":  "#ef4444",
    };

    // Animated count-up effect
    function animateCount(el, target) {
      if (target === 0) { el.textContent = "0"; return; }
      const duration = 600;
      const start = performance.now();
      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        // ease-out cubic
        const eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target);
        if (progress < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    // Session timer
    function startTimer() {
      chrome.storage.local.get("sessionStartTime", (data) => {
        const startTime = data.sessionStartTime || Date.now();
        const timerSpan = document.querySelector("#timer span");
        function update() {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const mins = Math.floor(elapsed / 60);
          const secs = elapsed % 60;
          timerSpan.textContent = `${mins}m ${secs}s`;
        }
        update();
        setInterval(update, 1000);
      });
    }

    // Load stats and animate
    chrome.storage.local.get("sessionStats", (data) => {
      const stats = data.sessionStats || { scanned: 0, flaggedAI: 0, textScanned: 0, textFlagged: 0 };
      const totalScanned = stats.scanned + (stats.textScanned || 0);
      const totalFlagged = stats.flaggedAI + (stats.textFlagged || 0);
      const pct = totalScanned > 0
        ? Math.round((totalFlagged / totalScanned) * 100)
        : 0;

      animateCount(document.getElementById("scanned"), totalScanned);
      animateCount(document.getElementById("flagged"), totalFlagged);
      document.getElementById("percent").textContent = `${pct}%`;

      const bar = document.getElementById("bar");
      bar.style.width = `${pct}%`;
      bar.className = `bar-fill ${pct > 40 ? "high" : pct > 20 ? "medium" : "low"}`;
    });

    // Load Information Diet Score
    async function loadIDS() {
      const data = await chrome.storage.local.get("userId");
      const userId = data.userId;
      if (!userId) return;

      try {
        const res = await fetch(
          `https://trustlens-nu.vercel.app/api/information-diet?user_id=${userId}`,
          { signal: AbortSignal.timeout(4000) }
        );
        if (!res.ok) return;
        const ids = await res.json();

        const gradeEl = document.getElementById("ids-grade");
        const scoreEl = document.getElementById("ids-score");
        const grade = ids.letter_grade || "—";
        const score = typeof ids.score === "number" ? Math.round(ids.score) : "—";

        gradeEl.textContent = grade;
        gradeEl.style.color = GRADE_COLORS[grade] || "#94a3b8";
        scoreEl.innerHTML = `${score} <span>/ 100</span>`;
      } catch {
        // Leave defaults — IDS endpoint may not exist yet
      }
    }

    // Filter mode buttons
    const filterButtons = document.querySelectorAll(".filter-btn");

    chrome.storage.local.get("filterMode", (data) => {
      const current = data.filterMode || "label";
      filterButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.mode === current);
      });
    });

    filterButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const mode = btn.dataset.mode;
        chrome.storage.local.set({ filterMode: mode });
        filterButtons.forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });

    startTimer();
    loadIDS();

    // Load page stats
    async function loadPageStats() {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      if (!tab?.url) return;

      let hostname;
      try { hostname = new URL(tab.url).hostname; } catch { return; }

      const data = await chrome.storage.local.get("pageStats");
      const pageStats = data.pageStats || {};
      const current = pageStats[hostname];

      if (current) {
        document.getElementById("page-section").style.display = "block";
        document.getElementById("page-hostname").textContent = hostname;
        document.getElementById("page-images").textContent = current.images || 0;
        document.getElementById("page-text").textContent = current.text || 0;
        document.getElementById("page-flagged").textContent = current.flagged || 0;
      }

      // Top pages list
      const entries = Object.entries(pageStats)
        .map(([host, s]) => ({ host, total: (s.images || 0) + (s.text || 0), flagged: s.flagged || 0 }))
        .filter(e => e.total > 0)
        .sort((a, b) => b.total - a.total)
        .slice(0, 5);

      if (entries.length > 0) {
        const container = document.getElementById("top-pages");
        container.style.display = "block";
        const list = document.getElementById("pages-list");
        const maxTotal = entries[0].total;

        entries.forEach(e => {
          const aiRate = e.total > 0 ? Math.round((e.flagged / e.total) * 100) : 0;
          const barColor = aiRate > 40 ? "#ef4444" : aiRate > 20 ? "#eab308" : "#22c55e";
          const row = document.createElement("div");
          row.className = "page-row";

          const name = document.createElement("span");
          name.className = "page-row-name";
          name.textContent = e.host;

          const barOuter = document.createElement("div");
          barOuter.className = "page-row-bar";
          const barInner = document.createElement("div");
          barInner.className = "page-row-fill";
          barInner.style.width = `${Math.round((e.total/maxTotal)*100)}%`;
          barInner.style.background = barColor;
          barOuter.appendChild(barInner);

          const count = document.createElement("span");
          count.className = "page-row-count";
          count.textContent = e.total;

          row.appendChild(name);
          row.appendChild(barOuter);
          row.appendChild(count);
          list.appendChild(row);
        });
      }
    }
    loadPageStats();
  </script>
</body>
</html>
